<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA-notary</title>
    <link rel="stylesheet" href="src/assets/styles.css">
</head>
<body>
    <!-- 🚨 HANDY-FEHLERMONITOR (Zeigt JS-Fehler sofort oben auf dem Smartphone an) -->
    <div id="handy-konsole" style="background: #fff0f0; color: #d90000; padding: 15px; font-family: monospace; font-size: 13px; z-index: 99999; position: relative; border-bottom: 3px solid red; display: none; word-wrap: break-word;">
        <strong>JavaScript Fehler erkannt:</strong><br>
    </div>
    <script>
        window.addEventListener('error', function(e) {
            const consoleDiv = document.getElementById('handy-konsole');
            consoleDiv.style.display = 'block';
            consoleDiv.innerHTML += '<div>❌ ' + e.message + ' <br><small>in ' + (e.filename ? e.filename.split('/').pop() : 'Unbekannt') + ':' + e.lineno + '</small></div><hr style="border:0;border-top:1px solid #ffcccc;">';
        });
    </script>

    <div id="app">System wird geladen...</div>

    <!-- 1. VENDOR-EBENE (Als Module geladen, da noble-Bibliotheken ES-Exporte nutzen) -->
    <script type="module" src="src/vendor/noble-hashes/sha3.js"></script>
    <script type="module" src="src/vendor/noble-secp256k1/index.js"></script>
    <script type="module" src="src/vendor/scure-bip39/english.js"></script>

    <!-- 2. CORE-EBENE: System-Logik & Config -->
    <script type="module" src="src/config.js"></script>
    <script type="module" src="src/core/crypto.js"></script>
    <script type="module" src="src/core/hd-wallet.js"></script>
    <script type="module" src="src/core/session.js"></script>
    <script type="module" src="src/core/auth.js"></script>

    <!-- 3. VIEW-EBENE: UI-Komponenten -->
    <script type="module" src="src/views/login.js"></script>
    <script type="module" src="src/views/dashboard.js"></script>
    <script type="module" src="src/views/wallet-import.js"></script>

    <!-- 4. APP-EBENE: Controller & Router -->
    <script type="module" src="src/app.js"></script>

    <!-- 5. SYSTEM-DIAGNOSE -->
    <script type="module">
        window.addEventListener("DOMContentLoaded", () => {
            console.log("System-Check: Prüfe Initialisierung...");
            setTimeout(() => {
                if (window.CryptoEngine || window.AuthService || document.getElementById('app').innerHTML !== 'System wird geladen...') {
                    console.log("System-Check: ERFOLG");
                } else {
                    const consoleDiv = document.getElementById('handy-konsole');
                    consoleDiv.style.display = 'block';
                    consoleDiv.innerHTML += '<div>⚠️ Warnung: Die Ansichten wurden nicht initialisiert. Prüfe die Reihenfolge der Skripte oder Modul-Exporte.</div>';
                }
            }, 500);
        });
    </script>
</body>
</html>
