<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA-notary</title>
    <link rel="stylesheet" href="src/assets/styles.css">
</head>
<body>
    <div id="app">System wird geladen...</div>

    <!-- 1. VENDOR-EBENE: Die Basis-Mathematik -->
    <script src="src/vendor/noble-hashes/sha3.js"></script>
    <script src="src/vendor/noble-secp256k1/index.js"></script>
    <script src="src/vendor/scure-bip39/index.js"></script>

    <!-- 2. CORE-EBENE: System-Logik & Config -->
    <script src="src/config.js"></script>
    <script src="src/core/crypto.js"></script>
    <script src="src/core/hd-wallet.js"></script>
    <script src="src/core/session.js"></script>
    <script src="src/core/auth.js"></script>

    <!-- 3. VIEW-EBENE: UI-Komponenten -->

    <script src="src/views/admin-panel.js"></script>

    <!-- 4. APP-EBENE: Controller & Router -->
    <script src="src/app.js"></script>

    <!-- 5. SYSTEM-DIAGNOSE -->
    <script>
        window.addEventListener("DOMContentLoaded", () => {
            console.log("System-Check: Prüfe Initialisierung...");
            if (typeof window.CryptoEngine !== 'undefined' && typeof window.AuthService !== 'undefined') {
                console.log("System-Check: ERFOLG - Alle Core-Services geladen.");
            } else {
                console.error("KRITISCH: Core-Services konnten nicht geladen werden!");
            }
        });
    </script>
