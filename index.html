<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA-notary</title>
    <link rel="stylesheet" href="src/assets/styles.css">
</head>
<body>
    <!-- 🚨 MOBILE-DIAGNOSEMONITOR -->
    <div id="handy-konsole" style="background: #fff0f0; color: #d90000; padding: 15px; font-family: monospace; font-size: 13px; z-index: 99999; position: relative; border-bottom: 3px solid red; display: none; word-wrap: break-word;">
        <strong>Centric Global Status (gh-pages):</strong><br>
    </div>

    <div id="app">System wird geladen...</div>

    <script>
        // Sichere globale Ladepflege (Deine Krypto-Abhängigkeiten fixfertig für den Browser vorkompiliert)
        const scriptQueue = [
            // 1. VENDOR (Direkt als global lauffähige Bundles eingebunden - keine Imports mehr nötig!)
            "https://jsdelivr.net",
            "https://jsdelivr.net",
            "https://jsdelivr.net",
            
            // 2. CONFIG & CORE (Deine reinen globalen Skripte)
            "src/config.js",
            "src/core/crypto.js",
            "src/core/hd-wallet.js",
            "src/core/session.js",
            
            // 3. VIEWS (UI-Ansichten)
            "src/views/login.js",
            "src/views/dashboard.js",
            "src/views/admin-panel.js", 
            
            // 4. APP CONTROL (Router)
            "src/app.js"
        ];

        const consoleDiv = document.getElementById('handy-konsole');
        
        window.addEventListener('error', function(e) {
            consoleDiv.style.display = 'block';
            consoleDiv.innerHTML += `<div>❌ Code-Fehler: ${e.message} <br><small>in ${e.filename ? e.filename.split('/').pop() : 'Unbekannt'}:${e.lineno}</small></div><hr style="border:0;border-top:1px solid #ffcccc;">`;
        });

        function loadNextScript(index) {
            if (index >= scriptQueue.length) {
                console.log("🚀 System erfolgreich global geladen!");
                return;
            }

            const scriptPath = scriptQueue[index];
            const script = document.createElement('script');
            
            // Reines globales JavaScript aktivieren
            script.type = "text/javascript"; 
            
            // Cache-Buster schützt vor veralteten Handy-Daten (gilt nur für deine lokalen Dateien)
            script.src = scriptPath.startsWith('http') ? scriptPath : scriptPath + "?v=" + Date.now();

            script.onload = () => loadNextScript(index + 1);

            script.onerror = () => {
                consoleDiv.style.display = 'block';
                consoleDiv.innerHTML += `<div>❌ <strong>Ladefehler (404):</strong> Datei fehlt im globalen gh-pages Spiegel:<br><code>${scriptPath}</code></div><hr style="border:0;border-top:1px solid #ffcccc;">`;
            };

            document.body.appendChild(script);
        }

        loadNextScript(0);
    </script>
</body>
</html>
