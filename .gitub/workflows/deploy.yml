name: CI-CD-Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir -p dist
          # EXKLUSIVE Kopie: Nur das, was wirklich in die Vitrine muss
          cp -r src/ dist/src/
          cp index.html dist/index.html
          # public Ordner nur kopieren, falls er existiert
          if [ -d "public" ]; then cp -r public/ dist/public/; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Die Garantie für die Trennung: 
          # Löscht den alten Branch-Inhalt komplett, bevor neu geschrieben wird.
          force_orphan: true
