name: Auto-Deploy (Cache-Bust)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build with Cache-Bust
        run: |
          set -e
          mkdir -p dist
          cp -r src dist/src
          cp index.html dist/index.html
          cp -r public dist/public 2>/dev/null || true

          HASH=$(date +%s)
          sed -i "s|src/app.js|src/app.js?v=$HASH|g" dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.WALLET_PC }}
          publish_dir: ./dist
