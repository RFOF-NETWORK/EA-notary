name: Auto-Merge-Build-Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:

  merge-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "RFOF-NETWORK"
          git config user.email "RFOF-NETWORK@users.noreply.github.com"

      - name: Pull gh-pages branch
        run: git pull origin gh-pages || true

      - name: Switch to main branch
        run: git checkout main

      - name: Merge gh-pages into main
        run: git merge gh-pages --no-edit || true

      - name: Resolve conflicts deterministically (prefer main)
        run: |
          git merge --strategy-option ours gh-pages || true
          git add .
          git commit -m "Automated merge resolution" || true

      - name: Push merged changes
        run: git push origin main

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: merge-branches

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build with Cache-Bust
        run: |
          set -e
          mkdir -p dist
          cp -r src dist/src
          cp index.html dist/index.html
          cp -r public dist/public 2>/dev/null || true

          HASH=$(date +%s)
          sed -i "s|src/app.js|src/app.js?v=$HASH|g" dist/index.html
          sed -i "s|<head>|<head><base href='/EA-notary/'>|g" dist/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
