name: CI-CD-Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build & Clean Deployment
        run: |
          # Alles Alte weg
          rm -rf dist
          mkdir -p dist
          
          # Kopiere NUR das, was wir brauchen
          cp -r src/ dist/src/
          cp -r public/ dist/public/
          cp index.html dist/index.html
          
          # HINZUGEFÜGT: Erstelle .nojekyll explizit, um Jekyll-Konflikte zu stoppen
          touch dist/.nojekyll
          
          echo "Deployment-Struktur fertig."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # force_orphan: true sorgt dafür, dass die gh-pages Branche 
          # bei jedem Deploy komplett neu erstellt wird.
          force_orphan: true
