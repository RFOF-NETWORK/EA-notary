name: CI-CD-Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build & Deploy
        run: |
          # 1. Bereinigen und Vorbereiten
          rm -rf dist
          mkdir -p dist
          
          # 2. Kopieren aller notwendigen Ressourcen
          cp -r src/ dist/src/
          cp -r public/ dist/public/
          cp index.html dist/index.html
          
          # 3. Validierung der Struktur
          echo "Prüfung der Struktur:"
          ls -F dist/
          ls -F dist/src/
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
