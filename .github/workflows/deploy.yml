name: CI-CD-Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Build & Prepare Pipeline
        run: |
          # 1. Erstelle das saubere Verzeichnis für die Projektion
          mkdir -p dist
          
          # 2. Kopiere NUR die essenziellen Funktionsbausteine
          # Das Nervenzentrum (src) und die Identitätshülle (public)
          cp -r src/ dist/src/
          cp -r public/ dist/public/
          
          # 3. Kopiere den Nullpunkt (Einstiegspunkt)
          cp index.html dist/index.html
          
          # Hinweis: package.json, README.md und .github/ werden hier 
          # bewusst NICHT in den dist-Ordner übernommen.

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Die architektonische Garantie: 
          # Jeder Durchlauf leert den gh-pages Branch komplett, 
          # bevor nur die frischen Dateien aus 'dist' projiziert werden.
          force_orphan: true
