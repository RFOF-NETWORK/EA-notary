name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write # Aus deinem Code integriert: Erlaubt das Schreiben im Repo via Token
  pages: write    # Erlaubt das Veröffentlichen der Webseite
  id-token: write # Erlaubt die sichere Authentifizierung

# Aus dem oberen Code integriert: Verhindert Abstürze, wenn du zweimal schnell hintereinander speicherst
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # Aus dem oberen Code integriert: Zeigt dir den fertigen Link direkt an
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.WALLET_AUTOMATION }} # Aus deinem Code integriert: Nutzt deinen erstellten Master-Token!

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.WALLET_AUTOMATION }} # Aus deinem Code integriert: Zwingt GitHub Pages, deinen Token zu nutzen
